# ==============================================================================
# PRIDE Submission Validation Rules
# ==============================================================================
#
# This file is the machine-readable source of truth for PRIDE submission
# validation. It defines which files are required, recommended, or optional
# for each supported analysis tool, along with compression rules, raw format
# specifications, and cross-file validation checks.
#
# Consumers:
#   - PRIDE Submission Tool (Java) — validates submissions at upload time
#   - Python validator scripts — standalone CLI validation of dataset folders
#   - Documentation generators — auto-generate markdown/HTML guidelines
#
# Structure:
#   version          — Schema version (semver)
#   file_categories  — Valid category values for file entries
#   compression      — Global compression rules (supported/rejected formats)
#   limits           — Hard upper bounds (e.g., max file size)
#   raw_formats      — Accepted raw data formats by vendor/instrument
#   condition_flags  — Flags a submission declares to activate conditional rules
#   common_files     — Shared file definitions reused across tool profiles
#   tools            — Self-contained validation profiles, one per analysis tool
#
# File entry fields:
#   name        — File name or logical identifier
#   status      — mandatory | recommended | optional
#   category    — One of the file_categories values
#   extensions  — Accepted file extensions
#   description — Human-readable description
#   columns     — (optional) Expected column names for tabular files
#   conditional — (optional) true if this file is only required when a
#                 condition_flag is active
#   condition_flag — (optional) Which flag activates this requirement
#
# Cross-file rule types:
#   reference_check        — Files in one category must appear in a target file
#   column_reference_check — Column values must match submitted filenames
#   file_count             — Min/max number of files in a category
#   archive_content        — Required contents inside compressed archives
#
# YAML anchors (&name / *name):
#   This file uses YAML anchors to avoid repeating identical file definitions.
#   An anchor is defined with & (e.g., &common_raw_files) and referenced with
#   * (e.g., *common_raw_files). The referenced block is inserted as-is.
#   All anchors are defined in the common_files section. When a tool needs
#   different values (e.g., MaxQuant requires SDRF as mandatory), the entry
#   is written inline instead of using the anchor.
#   YAML anchors are standard YAML 1.2 and supported by all major parsers
#   (Java SnakeYAML, Python PyYAML/ruamel, JavaScript js-yaml).
#
# ==============================================================================

version: "1.0.0"
description: "PRIDE submission validation rules — machine-readable source of truth"

file_categories:
  - ANALYSIS
  - RAW
  - PEAK
  - STANDARD
  - SPECTRAL_LIBRARY
  - FASTA
  - METADATA
  - OTHER

compression:
  supported_formats: [zip, gz, tar.gz]
  rejected_formats: [rar]
  max_archive_size_gb: 50

# A single PRIDE submission can contain multiple analyses (e.g., the same raw
# data searched with different tools or different parameters). Each analysis
# should be packaged as a separate archive with a descriptive name:
#   maxquant_analysis1.zip, maxquant_analysis2.zip, diann_results.zip
# Each archive is validated independently against its tool profile.
# The raw data and FASTA files are shared across analyses and submitted once.
multiple_analyses:
  allowed: true
  archive_naming: "one archive per analysis, named by tool and/or analysis description"
  shared_files: [RAW, FASTA, METADATA]
  per_analysis_files: [ANALYSIS, STANDARD, OTHER, SPECTRAL_LIBRARY, PEAK]

limits:
  # Hard upper bounds to prevent pathological single-file uploads.
  # NOTE: This is per *individual* RAW data file (uncompressed or compressed as a single run).
  # 1 TB (decimal) = 1000 GB.
  max_raw_file_size_gb: 1000

raw_formats:
  - id: thermo_raw
    category: RAW
    extensions: [.raw]
    vendor: "Thermo Fisher Scientific"
    compression_required: false
    one_run_per_archive: true
    directory_based: false
    format_type: binary
    binary_signature: "D0CF11E0A1B11AE1"
    internal_compression: "LZF"
    notes: "OLE2 compound document format. Already compressed internally (LZF) — additional gzip provides minimal benefit. Single file per run."

  - id: bruker_d
    category: RAW
    extensions: [.d.zip, .d.tar.gz]
    vendor: "Bruker"
    compression_required: true
    one_run_per_archive: true
    directory_based: true
    # Bruker .d folders contain different internal formats depending on the instrument.
    # A valid .d folder must contain ONE of these format sets:
    sub_formats:
      - id: tdf
        description: "timsTOF with ion mobility (timsTOF Pro/HT/SCP/fleX TIMS mode)"
        required_files: [analysis.tdf, analysis.tdf_bin]
        optional_files: [calibration.sqlite, chromatography-data.sqlite]
      - id: tsf
        description: "timsTOF without ion mobility (MALDI-qTOF mode)"
        required_files: [analysis.tsf, analysis.tsf_bin]
        optional_files: [calibration.sqlite]
      - id: baf
        description: "Bruker QTOF (maXis, impact, micrOTOF)"
        required_files: [analysis.baf]
        optional_files: [analysis.baf_idx, analysis.baf_xtr, calibration.sqlite]
      - id: yep
        description: "Older Bruker/Agilent ion traps"
        required_files: [analysis.yep]
      - id: fid
        description: "MALDI-TOF flex series (rapifleX, ultrafleXtreme, autoflex)"
        required_files: [fid, acqu]
        notes: "FID data uses a hierarchical directory structure with spot coordinates"

  - id: sciex_wiff
    category: RAW
    extensions: [.wiff, .wiff2, .wiff.scan]
    vendor: "SCIEX"
    compression_required: false
    one_run_per_archive: true
    directory_based: false
    # .wiff/.wiff2 files ALWAYS require a companion .wiff.scan file containing
    # the actual spectral (X-Y) data. The .wiff/.wiff2 file contains metadata only.
    # A single .wiff can contain multiple samples — PRIDE requires one run per file.
    # SCIEX OS v2.1+ generates both .wiff and .wiff2 simultaneously.
    companion_files:
      - extension: .wiff.scan
        required: true
        description: "Spectral data file — always paired with .wiff or .wiff2"
    notes: "Both .wiff and .wiff.scan are required for a valid submission. A single .wiff can contain multiple samples — ensure one run per file for PRIDE."

  - id: agilent_d
    category: RAW
    extensions: [.d.zip, .d.tar.gz]
    vendor: "Agilent"
    compression_required: true
    one_run_per_archive: true
    directory_based: true
    # Agilent .d folders contain AcqData/ with binary data files and Method/ with acquisition parameters.
    required_contents:
      - directory: AcqData
        required_files: [MSScan.bin, MSProfile.bin]
        optional_files: [MSMassCal.bin, MSPeak.bin, MSScan.xsd, MSTS.xml]
        description: "Acquisition data — binary spectral data and metadata"
    optional_contents:
      - directory: Method
        description: "Acquisition and analysis method files"
    internal_compression: "LZF (in MSProfile.bin)"

  - id: waters_raw
    category: RAW
    extensions: [.raw.zip, .raw.tar.gz]
    vendor: "Waters"
    compression_required: true
    one_run_per_archive: true
    directory_based: true
    # Waters .raw is ALWAYS a directory produced by MassLynx. Each .raw folder
    # contains one run. Compress the entire folder before submission.
    required_contents:
      - file: _HEADER.TXT
        description: "Run metadata (date, vial position)"
      - file: _FUNC001.DAT
        description: "Spectral data for first acquisition function"
      - file: _FUNC001.IDX
        description: "Index for first acquisition function data"
    optional_contents:
      - file: _extern.inf
        description: "Hardware operations and function type mapping (e.g., lockmass)"
      - file: _functns.inf
        description: "Information on acquired functions"
      - pattern: "_FUNC*.DAT/_FUNC*.IDX"
        description: "Additional acquisition functions (MS, UV, lockmass)"
    notes: "Waters .raw is always a directory — compress as .raw.zip or .raw.tar.gz. Synapt/IMS instruments use the same structure."

  - id: mzml
    category: RAW
    extensions: [.mzML.gz]
    standard: "PSI"
    format_type: open_standard
    schema_version: "1.1.1"
    compression_required: true
    one_run_per_archive: true
    directory_based: false
    # Both indexed and non-indexed mzML are accepted. Indexed mzML wraps the
    # document in <indexedmzML> with byte-offset indices for random access.
    notes: "PSI open standard XML format — accepted as alternative to vendor raw files. Schema 1.1.1. Both indexed and non-indexed accepted. GZ compression is mandatory (.mzML.gz) — one run per compressed file."

raw_data_validation:
  description: "PRIDE performs automated validation on submitted raw data files"
  checks:
    - id: file_integrity
      description: "Compressed archives are verified to ensure they are not corrupted and can be extracted"
    - id: format_validation
      description: "Raw files are checked to confirm they contain valid MS data and can be read by standard tools"
    - id: structure_verification
      description: "For directory-based formats (.d folders), essential files are verified (e.g., analysis.tdf for Bruker timsTOF, AcqData/ for Agilent)"

condition_flags:
  - id: library_search
    description: "Spectral library was used in the analysis"

  - id: metaproteomics
    description: "Metaproteomics study — database derived from metagenome assembly"

  - id: proteogenomics
    description: "Proteogenomics study — custom database from genomic/transcriptomic data"

  - id: patient_specific_database
    description: "Database contains personal/sensitive data (e.g., patient SNPs) — FASTA not required for privacy"

fasta_policy:
  description: >
    FASTA requirement depends on experiment type and database origin.
    The key principle is reproducibility: if a third party cannot obtain
    the exact same database independently, it must be provided.
  rules:
    - scenario: "Standard public database (UniProt Swiss-Prot, RefSeq, etc.)"
      fasta_required: false
      action: "Provide exact database name, version, and URL in metadata"
    - scenario: "Patient-specific / personal variant database (SNPs, individual variants)"
      fasta_required: false
      condition_flag: patient_specific_database
      action: "Document construction method; note privacy constraint in metadata"
    - scenario: "Metaproteomics (metagenome-derived database)"
      fasta_required: true
      condition_flag: metaproteomics
      action: "Upload FASTA file with submission"
    - scenario: "Proteogenomics (custom genomic/transcriptomic database)"
      fasta_required: true
      condition_flag: proteogenomics
      action: "Upload FASTA file with submission"

common_files:
  raw_files: &common_raw_files
    name: raw_files
    status: mandatory
    category: RAW
    extensions: [.raw, .mzML.gz, .wiff, .wiff2, .wiff.scan, .d.zip, .d.tar.gz, .raw.zip, .raw.tar.gz]
    description: "Raw data files from the mass spectrometer (vendor formats or mzML)"

  fasta_database: &common_fasta_database
    name: fasta_database
    status: mandatory
    category: FASTA
    extensions: [.fasta, .fa]
    description: >
      Protein sequence database used for search. Mandatory for metaproteomics
      and proteogenomics. For standard public databases (UniProt, RefSeq),
      providing name/version/URL in metadata is sufficient. Not required
      when database contains personal/sensitive data (see fasta_policy).
    conditional_override:
      - condition_flag: patient_specific_database
        status: not_required
      - condition_flag: metaproteomics
        status: mandatory
      - condition_flag: proteogenomics
        status: mandatory

  sdrf: &common_sdrf
    name: sdrf.tsv
    status: recommended
    category: METADATA
    extensions: [.sdrf.tsv]
    description: "SDRF metadata file describing samples and experimental design"

  peak_lists: &common_peak_lists
    name: peak_lists
    status: recommended
    category: PEAK
    extensions: [.mgf, .mzML, .dta, .pkl]
    description: "Processed peak lists extracted from raw data"

tools:
  - id: maxquant
    name: "MaxQuant"
    description: "Software suite for quantitative proteomics (DDA and DIA)"

    files:
      - *common_raw_files

      - *common_fasta_database

      - *common_sdrf

      - name: evidence.txt
        status: mandatory
        category: ANALYSIS
        extensions: [.txt]
        description: "Evidence table with peptide identifications and quantifications at PSM level"
        columns: [Sequence, Modified sequence, Raw file, Intensity, Charge, m/z, Retention time, Proteins, Leading razor protein, Type, Score, MS/MS count]

      - name: peptides.txt
        status: mandatory
        category: ANALYSIS
        extensions: [.txt]
        description: "Peptide-level identification and quantification results"
        columns: [Sequence, Proteins, Intensity, Score, PEP, Unique (Groups), Unique (Proteins)]

      - name: proteinGroups.txt
        status: mandatory
        category: ANALYSIS
        extensions: [.txt]
        description: "Protein group identification and quantification results"
        columns: [Protein IDs, Majority protein IDs, Peptide counts, Intensity, Score, PEP, Reverse, Potential contaminant]

      - name: mzTab.mzTab
        status: recommended
        category: STANDARD
        extensions: [.mzTab]
        description: "mzTab output containing identification and quantification data (must be enabled in MaxQuant settings)"

      - name: parameters.txt
        status: mandatory
        category: OTHER
        extensions: [.txt]
        description: "Processing parameters used in the analysis"

      - name: summary.txt
        status: mandatory
        category: OTHER
        extensions: [.txt]
        description: "Summary statistics of the MaxQuant run"

      - name: mqpar.xml
        status: mandatory
        category: OTHER
        extensions: [.xml]
        description: "MaxQuant parameter file containing all search settings"

      - name: allPeptides.txt
        status: recommended
        category: ANALYSIS
        extensions: [.txt]
        description: "All peptide-like features detected in the data"

      - name: msScans.txt
        status: recommended
        category: ANALYSIS
        extensions: [.txt]
        description: "MS scan information"

      - name: msmsScans.txt
        status: recommended
        category: ANALYSIS
        extensions: [.txt]
        description: "MS/MS scan information and fragment ion matches"

      - name: "Oxidation (M)Sites.txt"
        status: recommended
        category: ANALYSIS
        extensions: [.txt]
        description: "Oxidation modification site identifications"

      - name: modificationSpecificPeptides.txt
        status: recommended
        category: ANALYSIS
        extensions: [.txt]
        description: "Modified peptide identifications"

      - name: msms.txt
        status: optional
        category: ANALYSIS
        extensions: [.txt]
        description: "All MS/MS scans processed"

      - name: ms3Scans.txt
        status: optional
        category: ANALYSIS
        extensions: [.txt]
        description: "MS3 scan information and fragment ion matches"

      - name: fragment.txt
        status: optional
        category: ANALYSIS
        extensions: [.txt]
        description: "Fragment information"

      - name: fragmentQuant.txt
        status: optional
        category: ANALYSIS
        extensions: [.txt]
        description: "Fragment quantification data"

      - name: mzRange.txt
        status: optional
        category: ANALYSIS
        extensions: [.txt]
        description: "Isotope patterns in the data"

      - name: matchedFeatures.txt
        status: optional
        category: ANALYSIS
        extensions: [.txt]
        description: "Matched peptide-like features across samples by Match between runs"

      - name: dependentPeptides.txt
        status: optional
        category: ANALYSIS
        extensions: [.txt]
        description: "Dependent peptide analysis results"

      - name: mzidentml_export
        status: recommended
        category: STANDARD
        extensions: [.mzid]
        description: "Standard format export of identification results"

      - name: mztab_export
        status: recommended
        category: STANDARD
        extensions: [.mzTab]
        description: "Standard format export of quantification results"

      - name: spectral_library
        status: mandatory
        category: SPECTRAL_LIBRARY
        extensions: [.blib, .sptxt, .tsv]
        description: "Spectral library used for library-based search"
        conditional: true
        condition_flag: library_search

      - *common_peak_lists

    compression:
      analysis_grouping: single_archive
      recommended_name: "maxquant_results.zip"
      strategy: "ZIP or TAR.GZ the entire MaxQuant output folder including txt files and andromeda folder"

    cross_file_rules:
      - id: mq_raw_file_count
        rule_type: file_count
        category: RAW
        min: 1
        description: "At least one raw file must be submitted"

      - id: mq_fasta_file_count
        rule_type: file_count
        category: FASTA
        min: 1
        description: "At least one FASTA database must be submitted"

      - id: mq_raw_sdrf_match
        rule_type: reference_check
        source_category: RAW
        target_file: sdrf.tsv
        description: "Each raw file must be referenced in the SDRF file"

      - id: mq_evidence_raw_match
        rule_type: column_reference_check
        source_file: evidence.txt
        source_column: "Raw file"
        target_category: RAW
        description: "Raw file column in evidence.txt must match submitted raw filenames"

  - id: diann
    name: "DIA-NN"
    description: "Advanced software for DIA proteomics using neural networks"

    files:
      - *common_raw_files

      - *common_fasta_database

      - *common_sdrf

      - name: report
        status: mandatory
        category: ANALYSIS
        extensions: [.parquet, .tsv]
        description: "Main DIA-NN report file with all identifications and quantifications"
        columns: [File.Name, Protein.Group, Protein.Ids, Protein.Names, Genes, Precursor.Id, Modified.Sequence, Stripped.Sequence, Precursor.Charge, Q.Value, PG.Q.Value, Global.Q.Value, Precursor.Quantity, RT]

      - name: log_file
        status: mandatory
        category: OTHER
        extensions: [.log.txt, .txt]
        description: "DIA-NN analysis log file documenting processing steps"

      - name: site_report
        status: mandatory
        category: ANALYSIS
        extensions: [.site_report.parquet, .site_report.tsv]
        description: "PTM site localisation report — mandatory if produced by DIA-NN"
        conditional: true
        condition_note: "Only required when DIA-NN produces a site report (PTM analysis)"

      - name: parameter_config
        status: recommended
        category: OTHER
        extensions: [.pipeline.json, .pipeline, .cfg, .txt]
        description: "DIA-NN pipeline/configuration file with search parameters"

      - name: pr_matrix.tsv
        status: recommended
        category: ANALYSIS
        extensions: [.tsv]
        description: "Precursor-level quantification matrix"

      - name: pg_matrix.tsv
        status: recommended
        category: ANALYSIS
        extensions: [.tsv]
        description: "Protein group-level quantification matrix"

      - name: gg_matrix.tsv
        status: recommended
        category: ANALYSIS
        extensions: [.tsv]
        description: "Gene group-level quantification matrix"

      - name: stats.tsv
        status: recommended
        category: ANALYSIS
        extensions: [.tsv]
        description: "Per-run statistics from DIA-NN analysis"

      - name: mztab_export
        status: recommended
        category: STANDARD
        extensions: [.mzTab]
        description: "Standard format export of quantification results"

      - name: spectral_library
        status: mandatory
        category: SPECTRAL_LIBRARY
        extensions: [.speclib, .parquet, .tsv, .blib, .sptxt]
        description: "Spectral library used for library-based search (DIA-NN 1.8+ uses .speclib format)"
        conditional: true
        condition_flag: library_search

      - name: empirical_library
        status: recommended
        category: SPECTRAL_LIBRARY
        extensions: [.parquet, .tsv]
        description: "Empirical library produced by DIA-NN automatically as part of MBR (match-between-runs)"

      - *common_peak_lists

    compression:
      analysis_grouping: single_archive
      recommended_name: "diann_results.zip"
      strategy: "ZIP all DIA-NN output files including report and log files"

    cross_file_rules:
      - id: diann_raw_file_count
        rule_type: file_count
        category: RAW
        min: 1
        description: "At least one raw file must be submitted"

      - id: diann_fasta_file_count
        rule_type: file_count
        category: FASTA
        min: 1
        description: "At least one FASTA database must be submitted"

      - id: diann_raw_sdrf_match
        rule_type: reference_check
        source_category: RAW
        target_file: sdrf.tsv
        description: "Each raw file must be referenced in the SDRF file"

      - id: diann_report_raw_match
        rule_type: column_reference_check
        source_file: report
        source_column: "File.Name"
        target_category: RAW
        description: "File.Name column in report must match submitted raw filenames"

  - id: spectronaut
    name: "Spectronaut"
    description: "Commercial DIA proteomics analysis platform by Biognosys"

    files:
      - *common_raw_files

      - *common_fasta_database

      - *common_sdrf

      - name: main_report
        status: mandatory
        category: ANALYSIS
        extensions: [.tsv, .csv, .xlsx]
        description: "Primary Spectronaut report with peptide/protein identifications and quantifications"
        columns: [R.FileName, PG.ProteinAccessions, PG.ProteinNames, PG.Quantity, PG.Qvalue, EG.PrecursorId, EG.ModifiedSequence, EG.Qvalue, FG.Quantity]

      - name: analysis_settings
        status: mandatory
        category: OTHER
        extensions: [.json, .txt, .properties]
        description: "Spectronaut analysis settings file or exported parameters documenting the search configuration"

      - name: saved_experiment
        status: recommended
        category: ANALYSIS
        extensions: [.sne]
        description: "Full saved experiment file — can be loaded into the free Spectronaut Viewer version"

      - name: search_archive
        status: recommended
        category: ANALYSIS
        extensions: [.psar]
        description: "Search archives generated during library generation or directDIA (if available)"

      - name: protein_group_report
        status: recommended
        category: ANALYSIS
        extensions: [.tsv, .csv, .xlsx]
        description: "Protein group-level quantification report"

      - name: peptide_report
        status: recommended
        category: ANALYSIS
        extensions: [.tsv, .csv, .xlsx]
        description: "Peptide-level quantification report"

      - name: fragment_report
        status: optional
        category: ANALYSIS
        extensions: [.tsv, .csv, .xlsx]
        description: "Fragment-level quantification data"

      - name: candidates_report
        status: optional
        category: ANALYSIS
        extensions: [.tsv, .csv, .xlsx]
        description: "All candidate identifications before filtering"

      - name: mztab_export
        status: recommended
        category: STANDARD
        extensions: [.mzTab]
        description: "Standard format export of quantification results"

      - name: spectral_library
        status: mandatory
        category: SPECTRAL_LIBRARY
        extensions: [.kit, .speclib, .tsv, .csv]
        description: "Spectral library used for analysis"
        conditional: true
        condition_flag: library_search

      - *common_peak_lists

    compression:
      analysis_grouping: single_archive
      recommended_name: "spectronaut_results.zip"
      strategy: "ZIP all Spectronaut output files including reports and settings"

    cross_file_rules:
      - id: sn_raw_file_count
        rule_type: file_count
        category: RAW
        min: 1
        description: "At least one raw file must be submitted"

      - id: sn_fasta_file_count
        rule_type: file_count
        category: FASTA
        min: 1
        description: "At least one FASTA database must be submitted"

  - id: fragpipe
    name: "FragPipe/MSFragger"
    description: "Versatile MS proteomics analysis platform integrating MSFragger, Philosopher, IonQuant, and more"

    files:
      - *common_raw_files

      - *common_fasta_database

      - *common_sdrf

      - name: psm.tsv
        status: mandatory
        category: ANALYSIS
        extensions: [.tsv]
        description: "Peptide identification results at PSM level"
        columns: [Spectrum, Spectrum File, Peptide, Modified Peptide, Charge, Retention, Protein, Mapped Proteins, Hyperscore, PeptideProphet Probability]

      - name: protein.tsv
        status: mandatory
        category: ANALYSIS
        extensions: [.tsv]
        description: "Protein-level identification and inference results"
        columns: [Protein, Protein ID, Entry Name, Gene, Protein Probability, Combined Total Peptides, Total Spectral Count]

      - name: fragpipe.workflow
        status: mandatory
        category: OTHER
        extensions: [.workflow]
        description: "FragPipe configuration and parameter files"

      - name: fragpipe-files.fp-manifest
        status: mandatory
        category: OTHER
        extensions: [.fp-manifest]
        description: "FragPipe manifest files"

      - name: combined_ion.tsv
        status: recommended
        category: ANALYSIS
        extensions: [.tsv]
        description: "Combined ion-level results across experiments"

      - name: combined_modified_peptide.tsv
        status: recommended
        category: ANALYSIS
        extensions: [.tsv]
        description: "Combined peptidoform-level results across experiments"

      - name: combined_peptide.tsv
        status: recommended
        category: ANALYSIS
        extensions: [.tsv]
        description: "Combined peptide-level results across experiments"

      - name: combined_protein.tsv
        status: recommended
        category: ANALYSIS
        extensions: [.tsv]
        description: "Combined protein-level results across experiments"

      - name: combined_ion_label_quant.tsv
        status: recommended
        category: ANALYSIS
        extensions: [.tsv]
        description: "Combined ion-level results from isotopic labeling quantification"

      - name: combined_modified_peptide_label_quant.tsv
        status: recommended
        category: ANALYSIS
        extensions: [.tsv]
        description: "Combined peptidoform-level results from isotopic labeling quantification"

      - name: combined_protein_label_quant.tsv
        status: recommended
        category: ANALYSIS
        extensions: [.tsv]
        description: "Combined protein-level results from isotopic labeling quantification"

      - name: tmt_report_folder
        status: recommended
        category: ANALYSIS
        extensions: [.zip, .tar.gz]
        description: "Combined results from isobaric labeling quantification"

      - name: spectral_library
        status: mandatory
        category: SPECTRAL_LIBRARY
        extensions: [.blib, .sptxt, .tsv]
        description: "Spectral library used for library-based search"
        conditional: true
        condition_flag: library_search

      - name: pepxml_results
        status: recommended
        category: ANALYSIS
        extensions: [.pep.xml]
        description: "PepXML identification results from MSFragger/PeptideProphet"

      - name: mzidentml_export
        status: recommended
        category: STANDARD
        extensions: [.mzid]
        description: "Standard format export of identification results (via Philosopher)"

      - *common_peak_lists

    compression:
      analysis_grouping: single_archive
      recommended_name: "fragpipe_results.zip"
      strategy: "ZIP output .tsv and .csv files grouped by experiment/search"

    cross_file_rules:
      - id: fp_raw_file_count
        rule_type: file_count
        category: RAW
        min: 1
        description: "At least one raw file must be submitted"

      - id: fp_fasta_file_count
        rule_type: file_count
        category: FASTA
        min: 1
        description: "At least one FASTA database must be submitted"

      - id: fp_raw_sdrf_match
        rule_type: reference_check
        source_category: RAW
        target_file: sdrf.tsv
        description: "Each raw file must be referenced in the SDRF file"

      - id: fp_psm_raw_match
        rule_type: column_reference_check
        source_file: psm.tsv
        source_column: "Spectrum File"
        target_category: RAW
        description: "Spectrum File column in psm.tsv must match submitted raw filenames"

  - id: skyline
    name: "Skyline"
    description: "Open-source application for targeted proteomics (SRM/MRM/PRM/DIA)"

    files:
      - *common_raw_files

      - *common_fasta_database

      - *common_sdrf

      - name: skyline_shared
        status: recommended
        category: ANALYSIS
        extensions: [.sky.zip]
        description: "Skyline shared document archive (File > Share) — preferred format, contains .sky, .skyd, libraries, and FASTA in one archive"

      - name: skyline_document
        status: mandatory
        category: ANALYSIS
        extensions: [.sky]
        description: "Skyline document (XML) — required if not submitting .sky.zip"

      - name: skyline_data
        status: mandatory
        category: ANALYSIS
        extensions: [.skyd]
        description: "Skyline data file (binary cache) — required if not submitting .sky.zip"

      - name: exported_reports
        status: mandatory
        category: ANALYSIS
        extensions: [.csv, .tsv]
        description: "Exported quantification reports"

      - name: mztab_export
        status: recommended
        category: STANDARD
        extensions: [.mzTab]
        description: "Standard format export of quantification results"

      - name: spectral_library
        status: recommended
        category: SPECTRAL_LIBRARY
        extensions: [.blib]
        description: "Spectral library used for method development"

      - name: acquisition_method
        status: recommended
        category: OTHER
        extensions: [.method]
        description: "Instrument acquisition method file"

      - *common_peak_lists

    compression:
      analysis_grouping: single_archive
      recommended_name: "skyline_document.sky.zip"
      strategy: "Preferred: use Skyline File > Share Document to produce a .sky.zip archive. Alternative: submit .sky and .skyd files individually."

    cross_file_rules:
      - id: sky_raw_file_count
        rule_type: file_count
        category: RAW
        min: 1
        description: "At least one raw file must be submitted"

      - id: sky_fasta_file_count
        rule_type: file_count
        category: FASTA
        min: 1
        description: "At least one FASTA database must be submitted"

  - id: openms
    name: "OpenMS"
    description: "Open-source C++ library with Python bindings for LC/MS data analysis"

    files:
      - *common_raw_files

      - *common_fasta_database

      - *common_sdrf

      - name: idxml_results
        status: mandatory
        category: ANALYSIS
        extensions: [.idxml]
        description: "OpenMS identification results in idXML format"

      - name: quantification_results
        status: mandatory
        category: ANALYSIS
        extensions: [.consensusXML, .featureXML]
        description: "Quantification results from OpenMS (mandatory if quantification was performed)"

      - name: workflow_description
        status: mandatory
        category: OTHER
        extensions: [.toppas, .knwf, .py]
        description: "TOPP workflow, KNIME workflow, or pyOpenMS script"

      - name: mzidentml_export
        status: recommended
        category: STANDARD
        extensions: [.mzid]
        description: "Standard format export of identification results"

      - name: mztab_export
        status: recommended
        category: STANDARD
        extensions: [.mzTab]
        description: "Standard format export of identification and quantification results"

      - name: topp_parameter_files
        status: recommended
        category: OTHER
        extensions: [.ini, .xml]
        description: "Parameter files for individual TOPP tools used in the workflow"

      - *common_peak_lists

    compression:
      analysis_grouping: single_archive
      recommended_name: "openms_results.zip"
      strategy: "ZIP all OpenMS output XML files together"

    cross_file_rules:
      - id: oms_raw_file_count
        rule_type: file_count
        category: RAW
        min: 1
        description: "At least one raw file must be submitted"

      - id: oms_fasta_file_count
        rule_type: file_count
        category: FASTA
        min: 1
        description: "At least one FASTA database must be submitted"

  - id: mascot
    name: "Mascot"
    description: "Search engine for protein identification by matching MS data to peptide sequence databases"

    files:
      - *common_raw_files

      - *common_fasta_database

      - *common_sdrf

      - name: dat_files
        status: mandatory
        category: ANALYSIS
        extensions: [.dat]
        description: "Mascot search result files in DAT format"

      - name: mzidentml_export
        status: recommended
        category: STANDARD
        extensions: [.mzid]
        description: "Results exported in mzIdentML standard format (strongly recommended)"

      - name: parameter_file
        status: mandatory
        category: OTHER
        extensions: [.xml]
        description: "Mascot search parameter file"

      - name: mgf_files
        status: recommended
        category: PEAK
        extensions: [.mgf]
        description: "MGF peak list files used for the Mascot search"

      - *common_peak_lists

      - name: custom_modifications
        status: recommended
        category: OTHER
        extensions: [.txt, .xml]
        description: "List of custom modifications used (if applicable)"

    compression:
      analysis_grouping: single_archive
      recommended_name: "mascot_results.zip"
      strategy: "ZIP multiple .dat files grouped by experiment/project"

    cross_file_rules:
      - id: mascot_raw_file_count
        rule_type: file_count
        category: RAW
        min: 1
        description: "At least one raw file must be submitted"

      - id: mascot_fasta_file_count
        rule_type: file_count
        category: FASTA
        min: 1
        description: "At least one FASTA database must be submitted"

  - id: proteome_discoverer
    name: "Proteome Discoverer"
    description: "Thermo Scientific flexible software suite for proteomics research"

    files:
      - *common_raw_files

      - *common_fasta_database

      - *common_sdrf

      - name: pdresult_file
        status: mandatory
        category: ANALYSIS
        extensions: [.pdresult, .msf]
        description: "Proteome Discoverer result file (.pdresult for PD 2.x+, .msf for PD 1.x)"

      - name: psms_export
        status: mandatory
        category: ANALYSIS
        extensions: [.txt, .xlsx]
        description: "Exported PSM (Peptide Spectrum Match) results"
        columns: [Confidence, Sequence, Modifications, Charge, m/z, "MH+ [Da]", Spectrum File]

      - name: peptides_export
        status: mandatory
        category: ANALYSIS
        extensions: [.txt, .xlsx]
        description: "Exported peptide-level identification and quantification results"

      - name: proteins_export
        status: mandatory
        category: ANALYSIS
        extensions: [.txt, .xlsx]
        description: "Exported protein-level identification and quantification results"

      - name: workflow_template
        status: recommended
        category: OTHER
        extensions: [.pdStudy, .pdProcessingWF, .pdConsensusWF]
        description: "Proteome Discoverer workflow template or study file"

      - name: mzidentml_export
        status: recommended
        category: STANDARD
        extensions: [.mzid]
        description: "Standard format export of identification results (strongly recommended)"

      - *common_peak_lists

    compression:
      analysis_grouping: single_archive
      recommended_name: "proteome_discoverer_results.zip"
      strategy: "ZIP all Proteome Discoverer output files together"

    cross_file_rules:
      - id: pd_raw_file_count
        rule_type: file_count
        category: RAW
        min: 1
        description: "At least one raw file must be submitted"

      - id: pd_fasta_file_count
        rule_type: file_count
        category: FASTA
        min: 1
        description: "At least one FASTA database must be submitted"

  - id: msgfplus
    name: "MS-GF+"
    description: "Peptide identification tool matching MS/MS spectra to protein sequence databases"

    files:
      - *common_raw_files

      - *common_fasta_database

      - *common_sdrf

      - name: mzid_results
        status: mandatory
        category: STANDARD
        extensions: [.mzid]
        description: "MS-GF+ search results in mzIdentML format (native output)"

      - name: tsv_results
        status: optional
        category: ANALYSIS
        extensions: [.tsv]
        description: "MS-GF+ search results in TSV format (alternative to mzIdentML)"
        columns: [SpecID, ScanNum, FragMethod, Precursor, Charge, PepQValue, Peptide, Protein]

      - name: parameter_file
        status: mandatory
        category: OTHER
        extensions: [.params, .txt]
        description: "MS-GF+ search parameter file (.params is native format)"

      - name: peak_lists
        status: recommended
        category: PEAK
        extensions: [.mzML, .mgf]
        description: "Peak list files used for the search (MS-GF+ primarily accepts mzML input)"

    compression:
      analysis_grouping: single_archive
      recommended_name: "msgfplus_results.zip"
      strategy: "ZIP all MS-GF+ output files together"

    cross_file_rules:
      - id: msgf_raw_file_count
        rule_type: file_count
        category: RAW
        min: 1
        description: "At least one raw file must be submitted"

      - id: msgf_fasta_file_count
        rule_type: file_count
        category: FASTA
        min: 1
        description: "At least one FASTA database must be submitted"

  - id: generic
    name: "Other Tools"
    description: "Generic profile for tools not explicitly listed — requires RAW data, FASTA, and at least one ANALYSIS file"

    files:
      - *common_raw_files

      - *common_fasta_database

      - *common_sdrf

      - name: analysis_files
        status: mandatory
        category: ANALYSIS
        extensions: [.txt, .tsv, .csv, .pep.xml, .idxml, .dat, .pdresult, .parquet, .mzid, .mzTab]
        description: "Search results in native format from the analysis tool"

      - name: standard_format
        status: recommended
        category: STANDARD
        extensions: [.mzid, .mzTab]
        description: "Results converted to community standard formats when possible"

      - name: parameter_files
        status: recommended
        category: OTHER
        extensions: [.txt, .xml, .params, .cfg, .json]
        description: "Parameter files or detailed documentation of settings"

      - *common_peak_lists

      - name: spectral_library
        status: mandatory
        category: SPECTRAL_LIBRARY
        extensions: [.blib, .sptxt, .tsv]
        description: "Spectral library used for library-based search"
        conditional: true
        condition_flag: library_search

    compression:
      analysis_grouping: single_archive
      recommended_name: "analysis_results.zip"
      strategy: "ZIP or TAR.GZ all analysis output files from a single analysis into one archive"

    cross_file_rules:
      - id: gen_raw_file_count
        rule_type: file_count
        category: RAW
        min: 1
        description: "At least one raw file must be submitted"

      - id: gen_fasta_file_count
        rule_type: file_count
        category: FASTA
        min: 1
        description: "At least one FASTA database must be submitted"

      - id: gen_analysis_file_count
        rule_type: file_count
        category: ANALYSIS
        min: 1
        description: "At least one ANALYSIS file must be submitted"

      - id: gen_d_folder_bruker
        rule_type: archive_content
        applies_to_extensions: [.d.zip, .d.tar.gz]
        vendor: bruker_d
        # A valid Bruker .d archive must contain at least one of these format sets
        one_of:
          - pattern: "*/analysis.tdf"
            also_required: "*/analysis.tdf_bin"
            sub_format: tdf
          - pattern: "*/analysis.tsf"
            also_required: "*/analysis.tsf_bin"
            sub_format: tsf
          - pattern: "*/analysis.baf"
            sub_format: baf
          - pattern: "*/analysis.yep"
            sub_format: yep
          - pattern: "**/fid"
            also_required: "**/acqu"
            sub_format: fid
        description: "Bruker .d folders must contain a valid data format (TDF, TSF, BAF, YEP, or FID)"

      - id: gen_d_folder_agilent
        rule_type: archive_content
        applies_to_extensions: [.d.zip, .d.tar.gz]
        vendor: agilent_d
        required_contents:
          - pattern: "*/AcqData/MSScan.bin"
            description: "Scan record data"
          - pattern: "*/AcqData/MSProfile.bin"
            description: "Profile spectral data"
        description: "Agilent .d folders must contain AcqData/ with MSScan.bin and MSProfile.bin"
